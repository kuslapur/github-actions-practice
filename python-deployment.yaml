apiVersion: apps/v1
kind: Deployment
metadata:
  name: day04-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: day04-app
  template:
    metadata:
      labels:
        app: day04-app
    spec:
      containers:
      - name: day04-app
        image: YOUR_DOCKERHUB/day04-app:v1
        ports:
        - containerPort: 5000


---------
apiVersion: v1
kind: Service
metadata:
  name: day04-service
spec:
  type: NodePort
  selector:
    app: day04-app
  ports:
  - port: 80
    targetPort: 5000