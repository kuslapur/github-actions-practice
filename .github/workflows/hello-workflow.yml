name: Hello Workflow

on:
  push:

jobs:
  hello-job:
    runs-on: ubuntu-latest

    steps:
      - name: Print Message
        run: echo "Hello GitHub Actions"
       
      - name: Show Linux Info
        run: uname -a

      - name: Show Disk Space
        run: df -h

      - name: Show Memory
        run: free -h