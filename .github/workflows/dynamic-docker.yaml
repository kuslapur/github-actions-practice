name: Dynamic Docker Workflow

on:
  push:
    branches:
      - Day04

jobs:
  dynamic-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Dockerfile dynamically
        run: |
          cat <<EOF > Dockerfile
          FROM python:3.11-slim

          WORKDIR /app

          COPY requirements.txt .

          RUN pip install -r requirements.txt

          COPY . .

          EXPOSE 5000

          CMD ["python", "app.py"]
          EOF

      - name: Show Dockerfile content
        run: |
          cat Dockerfile

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/dynamic-docker:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/dynamic-docker:${{ github.sha }}